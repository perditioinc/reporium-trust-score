# Reporium Retrieval Quality Golden Set — v0 DRAFT
#
# Status: DRAFT, not wired into hourly.yml yet.
# Review doc: ../../CONFLUENCE_REPORIUM_GOLDEN_EVAL_SET_V0.md (platform root)
# Owner: Kim Loza
# Purpose: each query, when submitted to /intelligence/ask/stream, should return
#          at least one source whose category matches expected_categories in top-5.
#
# Schema:
#   - id: string (stable identifier)
#     query: string (submitted verbatim)
#     expected_categories: [list of taxonomy slugs — one match in top-5 = pass]
#     expected_repos_hint: [optional — for tightened eval later]
#     tags: [metadata — intent_type, difficulty, ...]
#
# Phase 6 will implement the runner in eval/run_golden.py. Until then, this file
# is the source of truth for the set. Edit here.

