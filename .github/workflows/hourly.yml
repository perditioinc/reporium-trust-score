name: Hourly Trust Probe

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health probe
        id: health
        run: |
          python -m probes.health > health.json
          cat health.json

      - name: Run synthetic ask probe
        id: ask
        env:
          REPORIUM_APP_TOKEN: ${{ secrets.REPORIUM_APP_TOKEN }}
        run: |
          python -m probes.synthetic_ask > ask.json
          cat ask.json

      - name: Compute score and save to history
        run: |
          python - <<'EOF'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          from lib.score import compute_trust_score
          from lib.storage import save_to_history

          health = json.loads(Path("health.json").read_text())
          ask = json.loads(Path("ask.json").read_text())
          score = compute_trust_score(health, ask)
          now = datetime.now(timezone.utc)
          payload = {
              "score": score,
              "health": health,
              "ask": ask,
              "ts": now.isoformat(),
          }
          path = save_to_history(payload, now)
          print(f"Wrote {path}")
          print(json.dumps(score, indent=2))
          EOF

      - name: Commit history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(history): hourly probe $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
